<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Python Quiz — Pandas, Matplotlib, Seaborn & MySQL</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #f5f7fa;
        --surface: #ffffff;
        --surface2: #f0f4f8;
        --border: #e2e8f0;
        --border2: #cbd5e0;
        --text: #1a202c;
        --muted: #64748b;
        --hint: #94a3b8;
        --blue: #2563eb;
        --blue-lt: #eff6ff;
        --blue-dk: #1e40af;
        --green: #16a34a;
        --green-lt: #f0fdf4;
        --green-dk: #14532d;
        --red: #dc2626;
        --red-lt: #fef2f2;
        --red-dk: #7f1d1d;
        --radius: 10px;
        --radius-sm: 6px;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* TOP BAR */
      .topbar {
        background: #1e293b;
        padding: 0 2rem;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .topbar-title {
        color: #f8fafc;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .topbar-score {
        background: #334155;
        color: #94a3b8;
        font-size: 13px;
        padding: 4px 14px;
        border-radius: 20px;
        font-weight: 500;
      }
      .topbar-score span {
        color: #f8fafc;
        font-weight: 700;
      }

      /* LAYOUT */
      .layout {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 0;
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        align-items: start;
      }
      @media (max-width: 768px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .sidebar {
          display: none;
        }
      }

      /* SIDEBAR */
      .sidebar {
        position: sticky;
        top: 72px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
      }
      .sidebar h3 {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--hint);
        margin-bottom: 0.75rem;
      }
      .topic-legend {
        margin-bottom: 0.75rem;
        padding-bottom: 0.65rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .tl-row {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 11px;
        color: var(--muted);
      }
      .tl-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .q-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 4px;
      }
      .q-dot {
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
        border-radius: var(--radius-sm);
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--muted);
        transition: all 0.15s;
      }
      .q-dot:hover {
        border-color: var(--blue);
        color: var(--blue);
      }
      .q-dot.current {
        border-color: var(--blue);
        background: var(--blue-lt);
        color: var(--blue-dk);
      }
      .q-dot.ok {
        background: var(--green-lt);
        border-color: var(--green);
        color: var(--green-dk);
      }
      .q-dot.wrong {
        background: var(--red-lt);
        border-color: var(--red);
        color: var(--red-dk);
      }
      .sidebar-stats {
        margin-top: 1rem;
        border-top: 1px solid var(--border);
        padding-top: 0.75rem;
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        padding: 3px 0;
      }
      .stat-row .lbl {
        color: var(--muted);
      }
      .stat-row .val {
        font-weight: 600;
        color: var(--text);
      }
      .c-ok {
        color: var(--green);
      }
      .c-wr {
        color: var(--red);
      }

      /* MAIN */
      .main {
        padding-left: 1.5rem;
      }
      @media (max-width: 768px) {
        .main {
          padding-left: 0;
        }
      }

      /* PROGRESS */
      .progress-wrap {
        margin-bottom: 1.5rem;
      }
      .progress-meta {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .progress-bar-bg {
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #2563eb, #7c3aed);
        border-radius: 3px;
        transition: width 0.4s ease;
      }

      /* CARD */
      .qcard {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.75rem 2rem;
        margin-bottom: 1.25rem;
      }
      .qcard-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 1rem;
      }
      .topic-badge {
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 20px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .qnum-badge {
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        margin-left: auto;
      }
      .shuffle-tag {
        font-size: 10px;
        color: var(--hint);
        background: var(--surface2);
        border: 1px solid var(--border);
        padding: 2px 8px;
        border-radius: 10px;
      }
      .qtext {
        font-size: 16px;
        font-weight: 500;
        color: var(--text);
        line-height: 1.65;
        margin-bottom: 1rem;
      }
      .qtext code {
        background: var(--surface2);
        border: 1px solid var(--border);
        padding: 1px 5px;
        border-radius: 3px;
        font-family: "Courier New", monospace;
        font-size: 13.5px;
        color: #1d4ed8;
      }
      .code-block {
        background: #0f172a;
        color: #e2e8f0;
        font-family: "Courier New", Consolas, monospace;
        font-size: 13px;
        line-height: 1.7;
        padding: 1rem 1.25rem;
        border-radius: var(--radius-sm);
        margin: 0.75rem 0 1rem;
        overflow-x: auto;
        white-space: pre;
        border-left: 3px solid #2563eb;
      }

      /* OPTIONS */
      .options {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .opt {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 16px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.15s;
        background: var(--surface);
        user-select: none;
      }
      .opt:hover:not(.locked) {
        border-color: #93c5fd;
        background: var(--blue-lt);
      }
      .opt.correct {
        border-color: var(--green);
        background: var(--green-lt);
      }
      .opt.wrong {
        border-color: var(--red);
        background: var(--red-lt);
      }
      .opt-letter {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 1.5px solid var(--border2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
        color: var(--muted);
        transition: all 0.15s;
      }
      .opt.correct .opt-letter {
        background: var(--green);
        border-color: var(--green);
        color: #fff;
      }
      .opt.wrong .opt-letter {
        background: var(--red);
        border-color: var(--red);
        color: #fff;
      }
      .opt-text {
        font-size: 14px;
        color: var(--text);
        line-height: 1.55;
        padding-top: 3px;
      }
      .opt-text code {
        background: rgba(0, 0, 0, 0.05);
        padding: 1px 4px;
        border-radius: 3px;
        font-family: "Courier New", monospace;
        font-size: 12px;
      }

      /* EXPLANATION */
      .explanation {
        margin-top: 1rem;
        padding: 0.9rem 1.1rem;
        background: var(--green-lt);
        border-left: 4px solid var(--green);
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        font-size: 13.5px;
        color: #166534;
        line-height: 1.6;
      }
      .explanation.wrong-exp {
        background: var(--red-lt);
        border-left-color: var(--red);
        color: #991b1b;
      }
      .explanation strong {
        font-weight: 700;
      }

      /* NAV */
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .btn {
        padding: 10px 22px;
        border-radius: var(--radius-sm);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        border: 1.5px solid var(--border2);
        background: var(--surface);
        color: var(--text);
        transition: all 0.15s;
      }
      .btn:hover {
        background: var(--surface2);
        border-color: #94a3b8;
      }
      .btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .btn.primary {
        background: var(--blue);
        border-color: var(--blue);
        color: #fff;
      }
      .btn.primary:hover {
        background: var(--blue-dk);
      }
      .btn.success {
        background: var(--green);
        border-color: var(--green);
        color: #fff;
      }
      .btn.success:hover {
        background: #15803d;
      }

      /* RESULTS */
      .results {
        max-width: 680px;
      }
      .score-banner {
        background: linear-gradient(135deg, #1e293b 0%, #1e3a5f 100%);
        border-radius: var(--radius);
        padding: 2.5rem 2rem;
        text-align: center;
        color: #fff;
        margin-bottom: 1.5rem;
      }
      .score-circle {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        border: 3px solid rgba(255, 255, 255, 0.25);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
      }
      .score-num {
        font-size: 38px;
        font-weight: 800;
        color: #60a5fa;
        line-height: 1;
      }
      .score-total {
        font-size: 14px;
        color: #94a3b8;
        margin-top: 2px;
      }
      .score-pct {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 4px;
      }
      .score-grade {
        font-size: 15px;
        color: #94a3b8;
      }
      .topic-breakdown {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-bottom: 1.5rem;
      }
      @media (max-width: 500px) {
        .topic-breakdown {
          grid-template-columns: 1fr;
        }
      }
      .tb-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 1rem 1.25rem;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .tb-icon {
        width: 40px;
        height: 40px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .tb-info .tb-topic {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 2px;
      }
      .tb-info .tb-score {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
      }
      .tb-info .tb-bar-bg {
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin-top: 4px;
        width: 100%;
      }
      .tb-info .tb-bar-fill {
        height: 4px;
        border-radius: 2px;
      }
      .review-section h3 {
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.75rem;
      }
      .review-grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 5px;
        margin-bottom: 1.5rem;
      }
      @media (max-width: 500px) {
        .review-grid {
          grid-template-columns: repeat(5, 1fr);
        }
      }
      .rv-dot {
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        border-radius: var(--radius-sm);
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--muted);
        transition: all 0.15s;
      }
      .rv-dot.ok {
        background: var(--green-lt);
        border-color: var(--green);
        color: var(--green-dk);
      }
      .rv-dot.wrong {
        background: var(--red-lt);
        border-color: var(--red);
        color: var(--red-dk);
      }
      .rv-dot:hover {
        transform: scale(1.08);
      }
      .results-nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-title">🐍 Python Quiz</div>
      <div class="topbar-score" id="topbar-score">
        Score: <span id="tb-num">0</span> / 40
      </div>
    </div>

    <div class="layout">
      <div class="sidebar" id="sidebar">
        <h3>Questions</h3>
        <!-- <div class="topic-legend">
          <div class="tl-row">
            <div class="tl-dot" style="background: #16a34a"></div>
            Pandas (Q1–13)
          </div>
          <div class="tl-row">
            <div class="tl-dot" style="background: #d97706"></div>
            Matplotlib (Q14–23)
          </div>
          <div class="tl-row">
            <div class="tl-dot" style="background: #7c3aed"></div>
            Seaborn (Q24–31)
          </div>
          <div class="tl-row">
            <div class="tl-dot" style="background: #2563eb"></div>
            MySQL (Q32–40)
          </div>
        </div> -->
        <div class="q-grid" id="qgrid"></div>
        <div class="sidebar-stats">
          <div class="stat-row">
            <span class="lbl">Answered</span
            ><span class="val" id="s-ans">0 / 40</span>
          </div>
          <div class="stat-row">
            <span class="lbl c-ok">✔ Correct</span
            ><span class="val c-ok" id="s-ok">0</span>
          </div>
          <div class="stat-row">
            <span class="lbl c-wr">✘ Wrong</span
            ><span class="val c-wr" id="s-wr">0</span>
          </div>
        </div>
      </div>
      <div class="main" id="main"></div>
    </div>

    <script>
      /* ─── RAW QUESTION BANK (Pandas → Matplotlib → Seaborn → MySQL) ─── */
      const RAW = [
        /* ── PANDAS ── */
        {
          topic: "Pandas",
          tc: "#14532D",
          bg: "#DCFCE7",
          q: "What is a Pandas Series?",
          opts: [
            "A 2D labeled data table",
            "A 1D labeled array that holds data of any type",
            "A Python list with no index",
            "A type of dictionary",
          ],
          ans: 1,
          exp: "A <strong>Series</strong> is a one-dimensional labeled array. It has an index on the left and values on the right — like a single column of a spreadsheet. Example: <code>pd.Series([10, 20, 30])</code>",
        },

        {
          topic: "Pandas",
          tc: "#14532D",
          bg: "#DCFCE7",
          q: "What does <code>pd.DataFrame(data)</code> produce when <code>data</code> is a dictionary?",
          code: 'data = {"Name": ["Amit", "Neha"], "Marks": [85, 92]}\ndf = pd.DataFrame(data)',
          opts: [
            "A Python list",
            "A 2D table — dict keys become column names, values become rows",
            "A Series",
            "A NumPy array",
          ],
          ans: 1,
          exp: "DataFrame from a dict uses <strong>keys as column names</strong> and values as column data. Rows are numbered 0, 1, 2 ... automatically unless you specify an index.",
        },

        {
          topic: "Pandas",
          tc: "#14532D",
          bg: "#DCFCE7",
          q: "What does <code>df.shape</code> return for a DataFrame with 5 rows and 4 columns?",
          opts: [
            "A list of column names",
            "The number of rows only",
            "The tuple (5, 4)",
            "The data types of each column",
          ],
          ans: 2,
          exp: "<strong>df.shape</strong> returns a tuple <code>(rows, columns)</code>. So (5, 4) means 5 rows and 4 columns. A quick way to check dataset dimensions without printing the whole DataFrame.",
        },

        {
          topic: "Pandas",
          tc: "#14532D",
          bg: "#DCFCE7",
          q: "What statistical information does <code>df.describe()</code> show?",
          opts: [
            "The first 5 rows",
            "Data types and null counts",
            "Count, mean, std, min, 25%, 50%, 75%, max for numeric columns",
            "Column names only",
          ],
          ans: 2,
          exp: "<strong>df.describe()</strong> gives a full statistical summary for all numeric columns: count, mean, std, min, max, and three quartile values (25%, 50%, 75%).",
        },

        {
          topic: "Pandas",
          tc: "#14532D",
          bg: "#DCFCE7",
          q: "What is the key difference between <code>df.loc[]</code> and <code>df.iloc[]</code>?",
          opts: [
            "They are identical",
            "loc uses index label; iloc uses integer position",
            "iloc uses index label; loc uses integer position",
            "loc is for columns, iloc is for rows",
          ],
          ans: 1,
          exp: "<strong>loc</strong> is label-based — <code>df.loc[2]</code> gets the row whose index label equals 2. <strong>iloc</strong> is position-based — <code>df.iloc[0]</code> always gets the very first row regardless of index labels.",
        },

        {
          topic: "Pandas",
          tc: "#14532D",
          bg: "#DCFCE7",
          q: "What rows does this boolean filter return?",
          code: 'df[df["Salary"] > 60000]',
          opts: [
            "Rows where Salary equals 60000",
            "Rows where Salary is less than 60000",
            "Only rows where Salary is greater than 60000",
            "Drops rows where Salary > 60000",
          ],
          ans: 2,
          exp: "Boolean filtering evaluates the condition row by row (True/False) and returns only the <strong>True rows</strong>. The original DataFrame is not modified.",
        },

        {
          topic: "Pandas",
          tc: "#14532D",
          bg: "#DCFCE7",
          q: "What does <code>df.isnull().sum()</code> return?",
          opts: [
            "Total number of rows in the DataFrame",
            "Count of missing NaN values per column",
            "A True/False for the whole DataFrame",
            "Rows where all values are null",
          ],
          ans: 1,
          exp: "<strong>isnull()</strong> creates a boolean mask (True where NaN). Calling <strong>.sum()</strong> on it adds up the True values per column, showing exactly how many values are missing in each column.",
        },

        {
          topic: "Pandas",
          tc: "#14532D",
          bg: "#DCFCE7",
          q: "What does <code>df['Sales'].fillna(df['Sales'].mean())</code> do?",
          opts: [
            "Drops all NaN rows",
            "Replaces NaN values in Sales with the column mean",
            "Returns True where NaN exists",
            "Fills all columns with zero",
          ],
          ans: 1,
          exp: "<strong>fillna()</strong> replaces NaN values with a specified value. Using <code>.mean()</code> fills gaps with the average, minimising distortion of the column statistics.",
        },

        {
          topic: "Pandas",
          tc: "#14532D",
          bg: "#DCFCE7",
          q: "What does this lambda code create?",
          code: 'df["Grade"] = df["Marks"].apply(\n    lambda x: "A" if x > 75 else ("B" if x > 40 else "C"))',
          opts: [
            "Filters rows with Marks > 75",
            "A new Grade column assigned by Marks value",
            "Sorts the DataFrame by Grade",
            "Drops rows where Marks < 40",
          ],
          ans: 1,
          exp: "<strong>apply()</strong> runs the lambda on every value in Marks. The nested if-else assigns 'A', 'B', or 'C'. The result is stored as a new column 'Grade' in the DataFrame.",
        },

        {
          topic: "Pandas",
          tc: "#14532D",
          bg: "#DCFCE7",
          q: "What does <code>df.groupby('Department')['Salary'].mean()</code> return?",
          opts: [
            "Total salary for all departments",
            "Mean salary per department group",
            "All rows sorted by Department",
            "A filtered DataFrame",
          ],
          ans: 1,
          exp: "<strong>groupby()</strong> splits the DataFrame into groups by 'Department'. Chaining <strong>.mean()</strong> computes the average Salary for each group. Result is a Series indexed by department name.",
        },

        {
          topic: "Pandas",
          tc: "#14532D",
          bg: "#DCFCE7",
          q: "What join type does <code>pd.merge(df_left, df_right, on='ID')</code> perform by default?",
          opts: [
            "Left join — all rows from df_left",
            "Right join — all rows from df_right",
            "Inner join — only rows with matching ID in both",
            "Outer join — all rows from both",
          ],
          ans: 2,
          exp: "<strong>pd.merge()</strong> defaults to <code>how='inner'</code>, keeping only rows where the key column (ID) exists in <strong>both</strong> DataFrames. Use <code>how='left'/'right'/'outer'</code> for other join types.",
        },

        {
          topic: "Pandas",
          tc: "#14532D",
          bg: "#DCFCE7",
          q: "What does <code>df.sort_values('Salary', ascending=False)</code> do?",
          opts: [
            "Sorts alphabetically A to Z",
            "Sorts rows by Salary from highest to lowest",
            "Removes duplicate salary values",
            "Filters to show only the highest salary",
          ],
          ans: 1,
          exp: "<strong>sort_values()</strong> reorders rows by the specified column. <code>ascending=False</code> sorts descending (high → low). <code>ascending=True</code> (the default) sorts ascending (low → high).",
        },

        {
          topic: "Pandas",

      /* ─── FISHER-YATES SHUFFLE ─── */
      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      /* ─── BUILD RANDOMIZED QUESTIONS ─── */
      /* For each question we create a shuffled version:
   - opts: shuffled option texts
   - ans:  new index pointing to the correct option after shuffle
   - shuffleMap: maps new index → original index (for reference)
*/
      function buildQuestions() {
        return RAW.map((q) => {
          // Create indexed options: [{text, origIdx}, ...]
          const indexed = q.opts.map((text, i) => ({ text, origIdx: i }));
          const shuffled = shuffle(indexed);
          const newAns = shuffled.findIndex((o) => o.origIdx === q.ans);
          return {
            topic: q.topic,
            tc: q.tc,
            bg: q.bg,
            q: q.q,
            code: q.code || null,
            opts: shuffled.map((o) => o.text),
            ans: newAns,
            exp: q.exp,
          };
        });
      }

      /* ─── STATE ─── */
      let Q = buildQuestions();
      let cur = 0,
        ans = new Array(40).fill(null),
        score = 0,
        showRes = false;

      const TOPIC_ORDER = ["Pandas", "Matplotlib", "Seaborn", "MySQL"];
      const TOPIC_ICONS = {
        Pandas: "🐼",
        Matplotlib: "📈",
        Seaborn: "🎨",
        MySQL: "🗄️",
      };

      /* ─── HELPERS ─── */
      const esc = (s) => s.replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const pct = (n, d) => Math.round((n / d) * 100);
      const grade = (p) =>
        p >= 90
          ? "Excellent — Outstanding!"
          : p >= 75
            ? "Good — Well done!"
            : p >= 60
              ? "Average — Keep revising!"
              : p >= 40
                ? "Below average — More practice needed"
                : "Needs significant revision";

      function updateTopbar() {
        document.getElementById("tb-num").textContent = score;
      }

      function renderSidebar() {
        const g = document.getElementById("qgrid");
        if (!g) return;
        g.innerHTML = Q.map((_, i) => {
          let c = "q-dot";
          if (!showRes && i === cur) c += " current";
          if (ans[i] !== null) c += ans[i] === Q[i].ans ? " ok" : " wrong";
          return `<div class="${c}" onclick="goto(${i})">${i + 1}</div>`;
        }).join("");
        const done = ans.filter((a) => a !== null).length;
        const ok = ans.filter((a, i) => a === Q[i].ans).length;
        document.getElementById("s-ans").textContent = done + " / 40";
        document.getElementById("s-ok").textContent = ok;
        document.getElementById("s-wr").textContent = done - ok;
      }

      function renderMain() {
        const m = document.getElementById("main");
        if (showRes) {
          renderResults(m);
          return;
        }
        const q = Q[cur];
        const ua = ans[cur];
        const done = ua !== null;
        const ok = done && ua === q.ans;
        const prog = ((cur + 1) / 40) * 100;

        m.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Question ${cur + 1} of 40</span>
        <span>${ans.filter((a) => a !== null).length} answered</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${prog}%"></div>
      </div>
    </div>
    <div class="qcard">
      <div class="qcard-header">
        <span class="topic-badge" style="background:${q.bg};color:${q.tc}">${q.topic}</span>
        <span class="qnum-badge">Q${cur + 1} / 40</span>
      </div>
      <div class="qtext">${q.q}</div>
      ${q.code ? `<div class="code-block">${esc(q.code)}</div>` : ""}
      <div class="options">
        ${q.opts
          .map((o, i) => {
            let c = "opt" + (done ? " locked" : "");
            if (done) {
              if (i === q.ans) c += " correct";
              else if (i === ua) c += " wrong";
            }
            const cl = done ? "" : `onclick="choose(${i})"`;
            return `<div class="${c}" ${cl}>
            <div class="opt-letter">${["A", "B", "C", "D"][i]}</div>
            <div class="opt-text">${o}</div>
          </div>`;
          })
          .join("")}
      </div>
      ${
        done
          ? `<div class="explanation ${ok ? "" : "wrong-exp"}">
        <strong>${ok ? "Correct!" : "Incorrect."}</strong> ${q.exp}
      </div>`
          : ""
      }
    </div>
    <div class="nav">
      <button class="btn" onclick="prev()" ${cur === 0 ? "disabled" : ""}>← Back</button>
      ${
        cur < 39
          ? `<button class="btn primary" onclick="next()" ${!done ? "disabled" : ""}>Next →</button>`
          : `<button class="btn success" onclick="finish()" ${!done ? "disabled" : ""}>See Results</button>`
      }
    </div>`;
      }

      function renderResults(m) {
        const p = pct(score, 40);
        const tMap = {};
        Q.forEach((q, i) => {
          if (!tMap[q.topic])
            tMap[q.topic] = { ok: 0, tot: 0, bg: q.bg, tc: q.tc };
          tMap[q.topic].tot++;
          if (ans[i] === q.ans) tMap[q.topic].ok++;
        });
        m.innerHTML = `
    <div class="results">
      <div class="score-banner">
        <div class="score-circle">
          <div class="score-num">${score}</div>
          <div class="score-total">out of 40</div>
        </div>
        <div class="score-pct">${p}% correct</div>
        <div class="score-grade">${grade(p)}</div>
      </div>
      <div class="topic-breakdown">
        ${TOPIC_ORDER.filter((t) => tMap[t])
          .map((t) => {
            const v = tMap[t];
            const b = pct(v.ok, v.tot);
            return `<div class="tb-card">
            <div class="tb-icon" style="background:${v.bg}">${TOPIC_ICONS[t] || "📌"}</div>
            <div class="tb-info" style="flex:1">
              <div class="tb-topic">${t}</div>
              <div class="tb-score">${v.ok} / ${v.tot}</div>
              <div class="tb-bar-bg">
                <div class="tb-bar-fill" style="width:${b}%;background:${v.tc}"></div>
              </div>
            </div>
          </div>`;
          })
          .join("")}
      </div>
      <div class="review-section">
        <h3>Question review — click to revisit</h3>
        <div class="review-grid">
          ${ans
            .map(
              (a, i) =>
                `<div class="rv-dot ${a === null ? "" : a === Q[i].ans ? "ok" : "wrong"}" onclick="goto(${i})">${i + 1}</div>`,
            )
            .join("")}
        </div>
      </div>
      <div class="results-nav">
        <button class="btn" onclick="goto(0)">Review from Q1</button>
        <button class="btn primary" onclick="restart()">Restart & Reshuffle</button>
      </div>
    </div>`;
      }

      /* ─── CONTROLS ─── */
      function choose(i) {
        if (ans[cur] !== null) return;
        ans[cur] = i;
        if (i === Q[cur].ans) score++;
        updateTopbar();
        renderSidebar();
        renderMain();
      }
      function next() {
        if (cur < 39) {
          cur++;
          renderSidebar();
          renderMain();
        }
      }
      function prev() {
        if (cur > 0) {
          cur--;
          renderSidebar();
          renderMain();
        }
      }
      function finish() {
        showRes = true;
        document.getElementById("sidebar").style.display = "none";
        renderMain();
      }
      function goto(i) {
        showRes = false;
        document.getElementById("sidebar").style.display = "";
        cur = i;
        renderSidebar();
        renderMain();
      }
      function restart() {
        Q = buildQuestions(); // fresh shuffle of all options
        cur = 0;
        ans = new Array(40).fill(null);
        score = 0;
        showRes = false;
        document.getElementById("sidebar").style.display = "";
        updateTopbar();
        renderSidebar();
        renderMain();
      }

      /* ─── INIT ─── */
      updateTopbar();
      renderSidebar();
      renderMain();
    </script>
  </body>
</html>
